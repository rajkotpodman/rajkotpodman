<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>એડવાન્સ્ડ ઓપન સોર્સ પ્રોડક્ટ સ્કેનર</title>
    <script type="module">
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.6.0';
        window.pipeline = pipeline;
    </script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; color: #333; text-align: center; padding: 30px; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 700px; margin: 0 auto; }
        h1 { color: #9b59b6; margin-bottom: 25px; }
        .badge-os { background: #9b59b6; color: white; padding: 4px 10px; border-radius: 5px; font-size: 12px; font-weight: bold; }
        .upload-section { background: #eef2f7; border: 2px dashed #9b59b6; padding: 30px; border-radius: 8px; margin-bottom: 20px; cursor: pointer; }
        .upload-btn { background-color: #9b59b6; color: white; padding: 10px 20px; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; font-weight: bold; }
        .upload-btn:hover { background-color: #8e44ad; }
        #imagePreview { max-width: 100%; max-height: 250px; margin-top: 15px; display: none; border-radius: 5px; }
        #loading { display: none; font-size: 18px; color: #666; margin: 20px 0; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #9b59b6; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .result-table { width: 100%; border-collapse: collapse; margin-top: 25px; display: none; text-align: left; }
        .result-table th, .result-table td { padding: 12px; border: 1px solid #ddd; }
        .result-table th { background-color: #9b59b6; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>પ્રોડક્ટ ઓબ્જેક્ટ ડિટેક્ટર <span class="badge-os">ઓપન સોર્સ AI</span> 🚀</h1>
    <p>કોઈ પણ અક્ષર વગરનો પ્રોડક્ટનો ફોટો અપલોડ કરો, AI તેને આપોઆપ ઓળખી લેશે.</p>

    <div class="upload-section" onclick="document.getElementById('productImage').click();">
        <p style="margin-top:0;">કોઈપણ વસ્તુ કે પ્રોડક્ટનો ફોટો અહીં અપલોડ કરો</p>
        <input type="file" id="productImage" accept="image/*" style="display:none;" onchange="processProductImage(this)">
        <button class="upload-btn">ફોટો પસંદ કરો</button>
        <br>
        <img id="imagePreview" alt="Product Preview">
    </div>

    <div id="loading">
        <div class="spinner"></div>
        <span id="statusText">ઓપન સોર્સ ઓબ્જેક્ટ ડિટેક્શન મોડલ લોડ થઈ રહ્યું છે (પહેલીવાર વાર લાગશે)...</span>
    </div>

    <table class="result-table" id="resultTable">
        <thead>
            <tr>
                <th style="width: 30%;">વિગત (Attribute)</th>
                <th>માહિતી (Information)</th>
            </tr>
        </thead>
        <tbody id="resultBody"></tbody>
    </table>
</div>

<script>
    let detector = null;

    // મોડલને લોડ કરવાનું ફંક્શન
    async function getDetector() {
        if (!detector) {
            // Xenova/detr-resnet-50 એ ઓબ્જેક્ટ ઓળખવા માટેનું બેસ્ટ ઓપન સોર્સ મોડલ છે
            detector = await window.pipeline('object-detection', 'Xenova/detr-resnet-50');
        }
        return detector;
    }

    function processProductImage(input) {
        const file = input.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async function(e) {
            const preview = document.getElementById('imagePreview');
            preview.src = e.target.result;
            preview.style.display = 'inline-block';
            
            runObjectDetection(e.target.result);
        }
        reader.readAsDataURL(file);
    }

    async function runObjectDetection(imageSrc) {
        const loading = document.getElementById('loading');
        const table = document.getElementById('resultTable');
        const tbody = document.getElementById('resultBody');
        const statusText = document.getElementById('statusText');

        loading.style.display = 'block';
        table.style.display = 'none';
        tbody.innerHTML = '';

        try {
            statusText.innerText = "AI મોડલ ઈમેજ એનાલાઈઝ કરી રહ્યું છે...";
            const detect = await getDetector();
            const output = await detect(imageSrc);

            loading.style.display = 'none';

            if (output.length === 0) {
                alert("AI ફોટામાં રહેલી વસ્તુ ઓળખી શક્યું નહીં. કૃપા કરીને કોઈ સ્પષ્ટ ફોટો ટ્રાય કરો.");
                return;
            }

            // સૌથી વધુ કોન્ફિડન્સ વાળી પહેલી વસ્તુ લો
            const topResult = output[0];
            const detectedItem = topResult.label;
            const confidence = Math.round(topResult.score * 100);

            // રિઝલ્ટને ટેબલમાં સેટ કરો
            tbody.innerHTML = `
                <tr><td><strong>પ્રોડક્ટનું નામ (Detected Object)</strong></td><td><span style="text-transform: capitalize; font-weight: bold;">${detectedItem}</span></td></tr>
                <tr><td><strong>ચોકસાઈ (Accuracy)</strong></td><td>${confidence}%</td></tr>
                <tr><td><strong>ટેકનોલોજી (Engine)</strong></td><td>Transformers.js & DETR ResNet-50</td></tr>
                <tr><td><strong>મોડલ ટાઈપ</strong></td><td>૧૦૦% ઓપન સોર્સ (લોકલ ઇન્ફરન્સ)</td></tr>
            `;
            
            table.style.display = 'table';
        } catch (error) {
            console.error(error);
            alert("પ્રોસેસિંગમાં કોઈ ભૂલ આવી.");
            loading.style.display = 'none';
        }
    }
</script>

</body>
</html>
