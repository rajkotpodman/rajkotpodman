<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>પ્રોફેશનલ ઓપન સોર્સ પ્રોડક્ટ સ્કેનર</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; color: #333; text-align: center; padding: 30px; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 700px; margin: 0 auto; }
        h1 { color: #2c3e50; margin-bottom: 25px; }
        .badge-os { background: #16a085; color: white; padding: 4px 10px; border-radius: 5px; font-size: 12px; font-weight: bold; }
        .upload-section { background: #eef2f7; border: 2px dashed #16a085; padding: 30px; border-radius: 8px; margin-bottom: 20px; cursor: pointer; }
        .upload-btn { background-color: #16a085; color: white; padding: 10px 20px; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; font-weight: bold; }
        .upload-btn:hover { background-color: #1abc9c; }
        #imagePreview { max-width: 100%; max-height: 250px; margin-top: 15px; display: none; border-radius: 5px; }
        #loading { display: none; font-size: 18px; color: #666; margin: 20px 0; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #16a085; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .result-table { width: 100%; border-collapse: collapse; margin-top: 25px; display: none; text-align: left; }
        .result-table th, .result-table td { padding: 12px; border: 1px solid #ddd; }
        .result-table th { background-color: #16a085; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>સુપરસ્ટાર પ્રોડક્ટ સ્કેનર <span class="badge-os">૧૦૦% ઓપન સોર્સ</span> 🚀</h1>
    <p>કોઈ API Key વગર, કોઈપણ ઓબ્જેક્ટ કે પ્રોડક્ટનો ફોટો ઓળખો પળવારમાં!</p>

    <div class="upload-section" onclick="document.getElementById('productImage').click();">
        <p style="margin-top:0;">પ્રોડક્ટ અથવા હાર્ડવેરનો ફોટો અહીં અપલોડ કરો</p>
        <input type="file" id="productImage" accept="image/*" style="display:none;" onchange="processProductImage(this)">
        <button class="upload-btn">ફોટો સિલેક્ટ કરો</button>
        <br>
        <img id="imagePreview" alt="Product Preview">
    </div>

    <div id="loading">
        <div class="spinner"></div>
        <span id="statusText">ઓપન-સોર્સ વિઝન મોડલ (Hugging Face) દ્વારા ફોટો સ્કેન થઈ રહ્યો છે...</span>
    </div>

    <table class="result-table" id="resultTable">
        <thead>
            <tr>
                <th style="width: 30%;">વિગત (Attribute)</th>
                <th>મેળવેલી માહિતી (Information)</th>
            </tr>
        </thead>
        <tbody id="resultBody"></tbody>
    </table>
</div>

<script>
    function processProductImage(input) {
        const file = input.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const preview = document.getElementById('imagePreview');
            preview.src = e.target.result;
            preview.style.display = 'inline-block';
            
            // ફાઈલને સીધી બ્લોબ (Blob) તરીકે ઓપન-સોર્સ API પર મોકલો
            sendToHuggingFace(file);
        }
        reader.readAsDataURL(file);
    }

    async function sendToHuggingFace(fileBlob) {
        const loading = document.getElementById('loading');
        const table = document.getElementById('resultTable');
        const tbody = document.getElementById('resultBody');

        loading.style.display = 'block';
        table.style.display = 'none';
        tbody.innerHTML = '';

        // Hugging Face નું ફ્રી પબ્લિક ઇન્ફરન્સ યુઆરએલ (Google ViT મોડલ)
        const MODEL_URL = "https://api-inference.huggingface.co/models/google/vit-base-patch16-224";

        try {
            const response = await fetch(MODEL_URL, {
                method: "POST",
                body: fileBlob
            });

            if (!response.ok) {
                throw new Error("સર્વર પ્રતિસાદ આપવામાં નિષ્ફળ રહ્યું.");
            }

            const output = await response.json();
            loading.style.display = 'none';

            if (!output || output.length === 0) {
                alert("વસ્તુ ઓળખી શકાઈ નથી, કૃપા કરીને બીજો ફોટો ટ્રાય કરો.");
                return;
            }

            // રિઝલ્ટ ટેબલ તૈયાર કરો
            let rowsHtml = '';
            output.forEach((item, index) => {
                const confidence = Math.round(item.score * 100);
                if (index === 0) {
                    rowsHtml += `<tr><td><strong>ઓળખાયેલી પ્રોડક્ટ (Top Match)</strong></td><td><span style="text-transform: capitalize; font-weight: bold; color: #16a085; font-size: 18px;">${item.label}</span></td></tr>`;
                    rowsHtml += `<tr><td><strong>ચોકસાઈ (Confidence)</strong></td><td><b>${confidence}%</b></td></tr>`;
                } else if (index < 3) {
                    rowsHtml += `<tr><td>અન્ય શક્યતા (Option ${index})</td><td style="text-transform: capitalize;">${item.label} (${confidence}%)</td></tr>`;
                }
            });

            rowsHtml += `<tr><td><strong>મોડલ સોર્સ</strong></td><td>Google ViT (Open Source via Hugging Face)</td></tr>`;
            rowsHtml += `<tr><td><strong>લાઇસન્સ અને કી</strong></td><td>તદ્દન મફત / કોઈ API Key ની જરૂર નથી</td></tr>`;

            tbody.innerHTML = rowsHtml;
            table.style.display = 'table';

        } catch (error) {
            console.error(error);
            alert("મોડલ હજુ લોડ થઈ રહ્યું છે અથવા કોઈ કનેક્શન પ્રોબ્લેમ છે. કૃપા કરીને ૫ સેકન્ડ પછી ફરી ફોટો અપલોડ કરો.");
            loading.style.display = 'none';
        }
    }
</script>

</body>
</html>
