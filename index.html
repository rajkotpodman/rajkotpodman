<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>પાવરફુલ ઓપન સોર્સ પ્રોડક્ટ સ્કેનર</title>
    <script type="module">
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.6.0';
        window.pipeline = pipeline;
    </script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; color: #333; text-align: center; padding: 30px; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 700px; margin: 0 auto; }
        h1 { color: #d35400; margin-bottom: 25px; }
        .badge-os { background: #d35400; color: white; padding: 4px 10px; border-radius: 5px; font-size: 12px; font-weight: bold; }
        .upload-section { background: #eef2f7; border: 2px dashed #d35400; padding: 30px; border-radius: 8px; margin-bottom: 20px; cursor: pointer; }
        .upload-btn { background-color: #d35400; color: white; padding: 10px 20px; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; font-weight: bold; }
        .upload-btn:hover { background-color: #e67e22; }
        #imagePreview { max-width: 100%; max-height: 250px; margin-top: 15px; display: none; border-radius: 5px; }
        #loading { display: none; font-size: 18px; color: #666; margin: 20px 0; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #d35400; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .result-table { width: 100%; border-collapse: collapse; margin-top: 25px; display: none; text-align: left; }
        .result-table th, .result-table td { padding: 12px; border: 1px solid #ddd; }
        .result-table th { background-color: #d35400; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>સુપર ઓપન સોર્સ પ્રોડક્ટ સ્કેનર <span class="badge-os">No API Key</span> 🚀</h1>
    <p>નવું એડવાન્સ્ડ ઈમેજ ક્લાસિફિકેશન મોડલ જે અક્ષરો વગર પણ વસ્તુ ઓળખી લેશે.</p>

    <div class="upload-section" onclick="document.getElementById('productImage').click();">
        <p style="margin-top:0;">પ્રોડક્ટ કે કોઈ પણ હાર્ડવેરનો ફોટો અહીં અપલોડ કરો</p>
        <input type="file" id="productImage" accept="image/*" style="display:none;" onchange="processProductImage(this)">
        <button class="upload-btn">ફોટો સિલેક્ટ કરો</button>
        <br>
        <img id="imagePreview" alt="Product Preview">
    </div>

    <div id="loading">
        <div class="spinner"></div>
        <span id="statusText">મોડલ ડાઉનલોડ થઈ રહ્યું છે (પહેલી વાર ૨૦-૩૦ સેકન્ડ લાગશે)...</span>
    </div>

    <table class="result-table" id="resultTable">
        <thead>
            <tr>
                <th style="width: 30%;">વિગત (Attribute)</th>
                <th>મેળવેલી માહિતી (Information)</th>
            </tr>
        </thead>
        <tbody id="resultBody"></tbody>
    </table>
</div>

<script>
    let classifier = null;

    async function getClassifier() {
        if (!classifier) {
            // MobileNet V3 ખૂબ જ લાઈટવેઈટ અને ઇલેક્ટ્રોનિક્સ/રોજિંદી વસ્તુઓ ઓળખવા માટે બેસ્ટ છે
            classifier = await window.pipeline('image-classification', 'Xenova/mobilenetv3_large_100_224.manifest');
        }
        return classifier;
    }

    function processProductImage(input) {
        const file = input.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async function(e) {
            const preview = document.getElementById('imagePreview');
            preview.src = e.target.result;
            preview.style.display = 'inline-block';
            
            runImageClassification(e.target.result);
        }
        reader.readAsDataURL(file);
    }

    async function runImageClassification(imageSrc) {
        const loading = document.getElementById('loading');
        const table = document.getElementById('resultTable');
        const tbody = document.getElementById('resultBody');
        const statusText = document.getElementById('statusText');

        loading.style.display = 'block';
        table.style.display = 'none';
        tbody.innerHTML = '';

        try {
            statusText.innerText = "નવું AI મોડલ ઈમેજ ચેક કરી રહ્યું છે...";
            const classify = await getClassifier();
            const output = await classify(imageSrc);

            loading.style.display = 'none';

            if (!output || output.length === 0) {
                alert("વસ્તુ ઓળખી શકાઈ નથી.");
                return;
            }

            // મોડલ ટોપ ૩ શક્યતાઓ આપશે, આપણે તેને ગુજરાતીમાં સરસ રીતે બતાવીએ
            let rowsHtml = '';
            output.forEach((result, index) => {
                const confidence = Math.round(result.score * 100);
                if(index === 0) {
                    rowsHtml += `<tr><td><strong>સૌથી સંભવિત પ્રોડક્ટ (Top Match)</strong></td><td><span style="text-transform: capitalize; font-weight: bold; color: #d35400;">${result.label}</span> (${confidence}% ચોકસાઈ)</td></tr>`;
                } else {
                    rowsHtml += `<tr><td>વિકલ્પ ${index + 1} (Alternative)</td><td style="text-transform: capitalize;">${result.label} (${confidence}%)</td></tr>`;
                }
            });

            rowsHtml += `<tr><td><strong>એન્જિન ટાઈપ</strong></td><td>Transformers.js (MobileNetV3)</td></tr>`;
            rowsHtml += `<tr><td><strong>API કી સ્ટેટસ</strong></td><td>૧૦0% ફ્રી અને ઓપન સોર્સ</td></tr>`;

            tbody.innerHTML = rowsHtml;
            table.style.display = 'table';
        } catch (error) {
            console.error(error);
            alert("પ્રોસેસિંગમાં એરર આવી.");
            loading.style.display = 'none';
        }
    }
</script>

</body>
</html>
