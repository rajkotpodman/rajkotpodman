<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>રાજકોટ પ્રોડક્ટ લોકેટર</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; color: #333; text-align: center; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 800px; margin: 0 auto; }
        h1 { color: #e74c3c; margin-bottom: 10px; }
        .search-box { margin: 20px 0; display: flex; justify-content: center; gap: 10px; }
        .search-input { width: 60%; padding: 12px; border: 2px solid #e74c3c; border-radius: 5px; font-size: 16px; }
        .search-btn { background-color: #e74c3c; color: white; padding: 12px 25px; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; font-weight: bold; }
        .search-btn:hover { background-color: #c0392b; }
        #map { height: 450px; width: 100%; border-radius: 8px; margin-top: 20px; box-shadow: inset 0 0 10px rgba(0,0,0,0.2); }
        #status { font-weight: bold; color: #7f8c8d; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>રાજકોટ પ્રોડક્ટ માર્કેટ લોકેટર 📍</h1>
    <p>તમારે જે વસ્તુ ખરીદવી હોય તેનું નામ લખો, તે રાજકોટમાં ક્યાં મળશે તે મેપ પર જુઓ.</p>

    <div class="search-box">
        <input type="text" id="productName" class="search-input" placeholder="પ્રોડક્ટનું નામ લખો (e.g., Computer, Mobile, Clothes)..." onkeypress="if(event.key === 'Enter') searchProduct()">
        <button class="search-btn" onclick="searchProduct()">શોધો</button>
    </div>

    <div id="status">નકશો લોડ થઈ રહ્યો છે...</div>
    <div id="map"></div>
</div>

<script>
    // રાજકોટના સેન્ટર લોકેશન (Latitude, Longitude) પર મેપ સેટ કરો
    const rajkotLat = 22.3039;
    const rajkotLng = 70.8022;
    
    // મેપ ઇનિશિયલાઈઝ કરો
    const map = L.map('map').setView([rajkotLat, rajkotLng], 13);

    // ઓપન સોર્સ મેપ ટાઇલ્સ ઉમેરો
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    document.getElementById('status').innerText = "પ્રોડક્ટ શોધો એટલે દુકાનો મેપ પર દેખાશે.";

    let markersLayer = L.layerGroup().addTo(map);

    async function searchProduct() {
        const product = document.getElementById('productName').value.trim();
        if (!product) {
            alert("કૃપા કરીને પ્રોડક્ટનું નામ લખો.");
            return;
        }

        const statusDiv = document.getElementById('status');
        statusDiv.innerText = `રાજકોટમાં '${product}' ની દુકાનો શોધી રહ્યા છીએ...`;
        markersLayer.clearLayers(); // જૂના માર્કર્સ હટાવો

        // Overpass API - ઓપન સોર્સ લાઈવ ડેટા સર્ચ એન્જિન (માત્ર રાજકોટના એરિયા માટે)
        const boundingBox = "22.22,70.72,22.36,70.88"; // Rajkot City Coordinates
        const query = `[out:json][timeout:25];
            (
              node["shop"~"${product}",i](${boundingBox});
              way["shop"~"${product}",i](${boundingBox});
              node["name"~"${product}",i](${boundingBox});
              way["name"~"${product}",i](${boundingBox});
            );
            out center;`;

        const url = "https://overpass-api.de/api/interpreter?data=" + encodeURIComponent(query);

        try {
            const response = await fetch(url);
            const data = await response.json();

            if (!data.elements || data.elements.length === 0) {
                statusDiv.innerText = `રાજકોટમાં '${product}' માટે કોઈ ચોક્કસ લોકેશન મળ્યું નથી. બીજો શબ્દ ટ્રાય કરો (જેમ કે: computer, mobile, electronics, mall).`;
                return;
            }

            let count = 0;
            data.elements.forEach(element => {
                const lat = element.lat || (element.center && element.center.lat);
                const lon = element.lon || (element.center && element.center.lon);
                const name = element.tags.name || product;
                const shopType = element.tags.shop || "દુકાન";

                if (lat && lon) {
                    // નકશા પર લાલ કે વાદળી ટપકું/માર્કર મૂકો
                    L.marker([lat, lon])
                        .addTo(markersLayer)
                        .bindPopup(`<b>${name}</b><br>કેટેગરી: ${shopType}<br>રાજકોટ, ગુજરાત`)
                        .openPopup();
                    count++;
                }
            });

            statusDiv.innerText = `રાજકોટમાં '${product}' માટે ${count} લોકેશન મળ્યા!`;
            map.setView([rajkotLat, rajkotLng], 13); // નકશો રાજકોટ પર રીસેટ કરો

        } catch (error) {
            console.error(error);
            statusDiv.innerText = "શોધવામાં કોઈ સમસ્યા આવી, કૃપા કરીને ફરી ટ્રાય કરો.";
        }
    }
</script>

</body>
</html>
